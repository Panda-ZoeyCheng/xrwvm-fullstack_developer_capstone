<html>
<head>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/bootstrap.min.css"> 
</head>

<body>
    <div>
    {% include "Navbar.html" %}
    <div>

    <div class="card" style="width: 80%;margin: auto;">
        <div class="header text-center">
            <h1><strong>Contact Us</strong></h1>
            <p>We’d love to hear from you! Reach out with any inquiries about our cars or services.</p>
        </div>

    <div class="content d-flex justify-content-between">
        <div class="left-section">
            <div class="contact-info card p-4">
                <h3>Our Contact Information</h3>
                <p><strong>Phone:</strong> (123) 456-7890</p>
                <p><strong>Email:</strong> contact@zoomzoomcar.com</p>
                <p><strong>Address:</strong> 1234 Zoom St, Car City, CA 90001</p>
            </div>

            <div class="map card p-4">
                <h3>Our Location</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d58621702.621143624!2d6.64734800000001!3d26.262157399999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3f5007f8cc3254c5%3A0x8f0f73a85c12d657!2sZootopia!5e0!3m2!1sen!2sau!4v1730983150285!5m2!1sen!2sau" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>


        <div class="contact-form card p-4">
            <form action="/submit_contact" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Your Phone Number">
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="4" placeholder="Your Message" required></textarea>
                </div>
                <div class="btn submit-btn">Send Message</div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
